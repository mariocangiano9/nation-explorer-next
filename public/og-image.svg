<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#1e293b"/>
    </pattern>
    <clipPath id="globe-clip">
      <circle cx="100" cy="80" r="28"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Dot grid pattern -->
  <rect width="1200" height="630" fill="url(#dots)" opacity="0.6"/>

  <!-- Subtle world map outline (simplified continents) -->
  <g transform="translate(100, 420) scale(2.2, 1.2)" fill="none" stroke="#1e293b" stroke-width="0.8" opacity="0.5">
    <!-- North America -->
    <path d="M60,30 Q65,20 80,18 Q90,15 100,20 Q110,25 115,35 Q112,45 105,50 Q95,55 85,50 Q75,48 70,42 Q65,38 60,30Z"/>
    <!-- South America -->
    <path d="M95,60 Q100,55 105,58 Q110,65 112,80 Q110,95 105,100 Q100,105 95,95 Q90,85 92,75 Q93,65 95,60Z"/>
    <!-- Europe -->
    <path d="M175,22 Q180,18 190,20 Q195,22 198,28 Q196,32 190,35 Q185,33 180,30 Q176,27 175,22Z"/>
    <!-- Africa -->
    <path d="M175,42 Q180,38 190,40 Q198,45 200,55 Q198,70 195,80 Q190,85 185,82 Q178,75 176,65 Q174,55 175,42Z"/>
    <!-- Asia -->
    <path d="M200,15 Q215,10 235,12 Q250,15 260,22 Q265,30 260,38 Q250,42 240,40 Q230,38 220,35 Q210,30 205,25 Q200,20 200,15Z"/>
    <!-- Australia -->
    <path d="M265,70 Q275,65 285,68 Q290,72 288,78 Q282,82 275,80 Q268,78 265,70Z"/>
  </g>

  <!-- Globe icon (top left) -->
  <g transform="translate(80, 60)">
    <circle cx="0" cy="0" r="28" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.8"/>
    <ellipse cx="0" cy="0" rx="14" ry="28" fill="none" stroke="#3b82f6" stroke-width="1.2" opacity="0.5"/>
    <ellipse cx="0" cy="0" rx="22" ry="28" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.3"/>
    <line x1="-28" y1="0" x2="28" y2="0" stroke="#3b82f6" stroke-width="1" opacity="0.4"/>
    <line x1="-26" y1="-14" x2="26" y2="-14" stroke="#3b82f6" stroke-width="0.8" opacity="0.3"/>
    <line x1="-26" y1="14" x2="26" y2="14" stroke="#3b82f6" stroke-width="0.8" opacity="0.3"/>
    <circle cx="0" cy="0" r="4" fill="#3b82f6" opacity="0.6"/>
  </g>

  <!-- Main title -->
  <text x="600" y="270" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="96" font-weight="900" letter-spacing="-2" fill="white">NATION</text>
  <text x="600" y="370" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="96" font-weight="900" letter-spacing="-2" fill="#3b82f6">EXPLORER</text>

  <!-- Subtitle -->
  <text x="600" y="430" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="500" letter-spacing="6" fill="#64748b" text-transform="uppercase">INTERACTIVE GEOPOLITICAL INTELLIGENCE</text>

  <!-- Decorative line -->
  <line x1="440" y1="455" x2="760" y2="455" stroke="#1e293b" stroke-width="1"/>
  <line x1="540" y1="455" x2="660" y2="455" stroke="#3b82f6" stroke-width="2" opacity="0.5"/>

  <!-- Bottom accent dots -->
  <circle cx="570" cy="480" r="3" fill="#3b82f6" opacity="0.3"/>
  <circle cx="590" cy="480" r="3" fill="#3b82f6" opacity="0.5"/>
  <circle cx="610" cy="480" r="3" fill="#3b82f6" opacity="0.7"/>
  <circle cx="630" cy="480" r="3" fill="#3b82f6" opacity="0.5"/>
  <circle cx="650" cy="480" r="3" fill="#3b82f6" opacity="0.3"/>
</svg>
